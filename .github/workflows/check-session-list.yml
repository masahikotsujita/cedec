# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  push:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  schedule:
    - cron: "0 3 * * *"  # UTC時間で毎日3時に実行
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      - name: Get latest cedec session list
        run: curl -O "https://stat.cedec.cesa.or.jp/assets/json/2025/cedec_schedule.json"
      - name: Get github issue list
        id: get-github-issues
        uses: actions/github-script@v7
        with:
          script: |
            const issuesJson = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            return issuesJson.data;
      - name: Convert issue list to titles
        run: |
          titles=($(echo '${{ steps.get-github-issues.outputs.result }}' | jq -r '.[] | select(.pull_request | not) | .title'))
          echo "${titles[@]}"
      - name: Print cedec session list
        run: |
          TAB=$(printf '\t')
          jq -r '.[] | [.start, .end, .format, .title, .category, .difficulty, .duration, .description, .photo_ok, .sns_ok, .CEDIL, .URL] | @tsv' cedec_schedule.json | {
            while IFS="$TAB" read -r start end format title; do
              printf "start: %s end: %s format: %s title: %s\n" "$start" "$end" "$format" "$title"
            done
          }
